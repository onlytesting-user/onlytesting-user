name: Update GitHub Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 🌙 DARK THEME

      - name: Generate Dark Stats SVG
        uses: soulteary/github-readme-stats-action@main
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=dracula&border_radius=6&include_all_commits=true&count_private=true&rank_icon=github'
          path: profile/dark-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      # ☀️ LIGHT THEME

      - name: Generate Light Stats SVG
        uses: soulteary/github-readme-stats-action@main
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=catppuccin_latte&border_radius=6&include_all_commits=true&count_private=true&rank_icon=github'
          path: profile/light-stats.svg
          token: ${{ secrets.GH_TOKEN }}

      # 📦 COMMIT

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          # The "|| exit 0" prevents the action from failing if there are no changes
          git commit -m "docs: update profile stats [skip ci]" || exit 0
          git push
