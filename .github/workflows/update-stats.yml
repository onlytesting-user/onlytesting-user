name: Update GitHub Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate Stats SVG
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&bg_color=000&border_color=fff&border_radius=6&text_color=c0c0c0&title_color=e38c00&include_all_commits=true&count_private=true&hide_rank=true'
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Langs SVG
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&langs_count=8&bg_color=000&border_color=fff&border_radius=6&text_color=c0c0c0&title_color=e38c00&hide=html,css,java,javascript,typescript'
          path: profile/langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          # The "|| exit 0" prevents the action from failing if there are no changes
          git commit -m "docs: update profile stats [skip ci]" || exit 0
          git push
